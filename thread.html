<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gnarwall - Thread</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
  <a href="index.html" class="logo">Gnar wall</a>
</header>

<main class="thread-page">
  <div class="thread-page-head">
    <h1 id="threadTitle">Loading thread...</h1>
    <a id="addPanelLink" href="#" class="btn-primary">+ Add Panel</a>
  </div>

  <div id="panelStrip" class="panel-strip"></div>

  <a href="index.html" class="back-link">&larr; Back to board</a>
</main>

<div id="lightbox" class="lightbox" hidden>
  <button id="lightboxClose" class="lightbox-close" type="button" aria-label="Close">&times;</button>
  <img id="lightboxImg" class="lightbox-img" alt="Expanded panel">
  <button id="lightboxDownload" class="btn-primary lightbox-download" type="button">Download</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/thread.js"></script>
</body>
</html>
